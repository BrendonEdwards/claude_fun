<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#fef3c7"/>
  <!-- Notepad -->
  <rect x="96" y="80" width="320" height="352" rx="16" fill="#fff" stroke="#e5e7eb" stroke-width="4"/>
  <!-- Lines -->
  <line x1="130" y1="154" x2="382" y2="154" stroke="#d1d5db" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="198" x2="382" y2="198" stroke="#d1d5db" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="242" x2="320" y2="242" stroke="#d1d5db" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="286" x2="382" y2="286" stroke="#d1d5db" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="330" x2="260" y2="330" stroke="#d1d5db" stroke-width="6" stroke-linecap="round"/>
  <!-- Pencil icon -->
  <g transform="translate(310,360) rotate(-45)">
    <rect x="-12" y="-50" width="24" height="80" rx="4" fill="#ca8a04"/>
    <polygon points="-12,30 12,30 0,52" fill="#f59e0b"/>
    <rect x="-12" y="-62" width="24" height="14" rx="2" fill="#9ca3af"/>
  </g>
  <!-- Title text -->
  <text x="256" y="124" text-anchor="middle" fill="#ca8a04" font-family="Arial,sans-serif" font-size="28" font-weight="bold">My Notes</text>
</svg>
