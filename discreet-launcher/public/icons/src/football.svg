<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#1a7c3e"/>
  <!-- Football pitch lines -->
  <rect x="80" y="130" width="352" height="252" rx="8" fill="none" stroke="#fff" stroke-width="10"/>
  <line x1="256" y1="130" x2="256" y2="382" stroke="#fff" stroke-width="10"/>
  <circle cx="256" cy="256" r="48" fill="none" stroke="#fff" stroke-width="10"/>
  <circle cx="256" cy="256" r="5" fill="#fff"/>
  <!-- Left goal -->
  <rect x="80" y="210" width="36" height="92" fill="none" stroke="#fff" stroke-width="10"/>
  <!-- Right goal -->
  <rect x="396" y="210" width="36" height="92" fill="none" stroke="#fff" stroke-width="10"/>
  <!-- Score text area -->
  <rect x="176" y="60" width="160" height="52" rx="10" fill="#fff" opacity="0.15"/>
  <text x="256" y="94" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="30" font-weight="bold">2 – 1</text>
</svg>
