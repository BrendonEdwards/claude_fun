<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Q-shaped pie chart favicon -->
  <rect width="32" height="32" rx="8" fill="#1B3A5F"/>
  <!-- Gold segment (top arc) -->
  <path d="M 6.1 10.8 A 9.6 9.6 0 0 1 19.2 7.3 L 17.6 11.4 A 4.8 4.8 0 0 0 11 13.2 Z" fill="#C5A55A"/>
  <!-- White segment (right arc) -->
  <path d="M 19.2 7.3 A 9.6 9.6 0 0 1 21.8 21.7 L 18.9 18.7 A 4.8 4.8 0 0 0 17.6 11.4 Z" fill="white" opacity="0.9"/>
  <!-- Light blue segment (left arc) -->
  <path d="M 14.4 25.2 A 9.6 9.6 0 0 1 6.1 10.8 L 11 13.2 A 4.8 4.8 0 0 0 14.4 20.4 Z" fill="#6B9FD4"/>
  <!-- Q tail -->
  <rect x="0" y="-1.4" width="6.5" height="2.8" rx="1.4" transform="translate(20.4 21.2) rotate(45)" fill="white" opacity="0.9"/>
</svg>
