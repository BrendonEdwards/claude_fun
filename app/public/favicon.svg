<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Q-shaped pie chart favicon with 4 quarters. Centre (16,16), outer r=9.6, inner r=4.8 -->
  <rect width="32" height="32" rx="8" fill="#1B3A5F"/>
  <!-- Q1 top-right (gold) -->
  <path d="M 16 6.4 A 9.6 9.6 0 0 1 25.6 16 L 20.8 16 A 4.8 4.8 0 0 0 16 11.2 Z" fill="#C5A55A"/>
  <!-- Q2 bottom-right (white) -->
  <path d="M 25.6 16 A 9.6 9.6 0 0 1 16 25.6 L 16 20.8 A 4.8 4.8 0 0 0 20.8 16 Z" fill="white" opacity="0.85"/>
  <!-- Q3 bottom-left (light blue) -->
  <path d="M 16 25.6 A 9.6 9.6 0 0 1 6.4 16 L 11.2 16 A 4.8 4.8 0 0 0 16 20.8 Z" fill="#6B9FD4"/>
  <!-- Q4 top-left (light gold) -->
  <path d="M 6.4 16 A 9.6 9.6 0 0 1 16 6.4 L 16 11.2 A 4.8 4.8 0 0 0 11.2 16 Z" fill="#D4C076"/>
  <!-- Q tail -->
  <rect x="0" y="-1.4" width="6.5" height="2.8" rx="1.4" transform="translate(20.4 21.2) rotate(45)" fill="white" opacity="0.85"/>
</svg>
